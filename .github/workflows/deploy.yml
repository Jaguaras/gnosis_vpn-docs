name: Deploy to IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Kubo (IPFS)
        run: |
          curl -sL https://dist.ipfs.tech/kubo/v0.32.0/kubo_v0.32.0_linux-amd64.tar.gz | tar xz
          sudo install -m 0755 kubo/ipfs /usr/local/bin/ipfs
          ipfs init --profile server

      - name: Deploy to IPFS via Pinata
        id: deploy
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm install pinata --no-save

          # Build the IPFS directory locally — gives the canonical CID with
          # index.html at root, no wrapper. main.js (432KB) gets chunked here.
          CID=$(ipfs add -r --cid-version=1 --quieter build)
          echo "Content CID: $CID"

          # Export all blocks as a CAR. Pinata will store exactly these blocks,
          # so the returned CID will equal the one kubo computed above.
          ipfs dag export "$CID" > content.car

          # Upload the CAR via pinata.upload.public.file().car()
          CONTENT_CID="$CID" node <<'EOF'
          const fs = require('fs');
          const { PinataSDK } = require('pinata');
          const pinata = new PinataSDK({ pinataJwt: process.env.PINATA_JWT });

          (async () => {
            const buf = fs.readFileSync('content.car');
            const carFile = new File([buf], 'upload.car', { type: 'application/vnd.ipld.car' });
            const result = await pinata.upload.public
              .file(carFile)
              .car()
              .name(`${process.env.GITHUB_REPOSITORY}@${process.env.GITHUB_SHA}`)
              .keyvalues({
                repository: process.env.GITHUB_REPOSITORY,
                commit: process.env.GITHUB_SHA,
                branch: process.env.GITHUB_REF_NAME
              });
            console.log('Pinata CID:', result.cid);
            console.log('Local CID: ', process.env.CONTENT_CID);
            if (result.cid !== process.env.CONTENT_CID) {
              console.warn('WARNING: CID mismatch — using Pinata CID');
            }
            const cid = result.cid || process.env.CONTENT_CID;
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `cid=${cid}\n`);
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Show result
        run: |
          echo "Deployed CID: ${{ steps.deploy.outputs.cid }}"
          echo "Gateway: https://ipfs.io/ipfs/${{ steps.deploy.outputs.cid }}"
