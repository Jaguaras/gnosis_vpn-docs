name: Deploy to IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to IPFS via Pinata
        id: deploy
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm install pinata --no-save
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const { PinataSDK } = require('pinata');
          const pinata = new PinataSDK({ pinataJwt: process.env.PINATA_JWT });

          const mime = {
            '.html':'text/html','.css':'text/css','.js':'application/javascript',
            '.json':'application/json','.png':'image/png','.jpg':'image/jpeg',
            '.jpeg':'image/jpeg','.gif':'image/gif','.svg':'image/svg+xml',
            '.txt':'text/plain','.md':'text/markdown','.wasm':'application/wasm',
            '.woff':'font/woff','.woff2':'font/woff2','.ico':'image/x-icon'
          };

          function collect(dir, base, out = []) {
            for (const name of fs.readdirSync(dir)) {
              const full = path.join(dir, name);
              if (fs.statSync(full).isDirectory()) {
                collect(full, base, out);
              } else {
                const rel = path.relative(base, full);
                const buf = fs.readFileSync(full);
                out.push(new File([buf], rel, { type: mime[path.extname(name).toLowerCase()] || 'application/octet-stream' }));
              }
            }
            return out;
          }

          (async () => {
            const files = collect('build', 'build');
            console.log(`Uploading ${files.length} files...`);

            // Pinata's fileArray wraps all files under a folder. With
            // GITHUB_REPOSITORY = "org/repo", only "repo@sha" becomes the folder name.
            const repoName = (process.env.GITHUB_REPOSITORY || '').split('/').pop();
            const folderName = `${repoName}@${process.env.GITHUB_SHA}`;

            const res = await pinata.upload.public.fileArray(files)
              .name(`${process.env.GITHUB_REPOSITORY}@${process.env.GITHUB_SHA}`)
              .keyvalues({
                repository: process.env.GITHUB_REPOSITORY,
                commit: process.env.GITHUB_SHA,
                branch: process.env.GITHUB_REF_NAME
              });
            const outerCid = res.cid;
            console.log('Outer CID:', outerCid);
            console.log('Folder name:', folderName);

            // Resolve the inner (unwrapped) CID via X-Ipfs-Roots response header.
            // Fetching any file under the folder returns this header listing all
            // directory CIDs traversed: "outerCid,innerCid". We want index 1.
            let finalCid;
            const url = `https://gateway.pinata.cloud/ipfs/${outerCid}/${encodeURIComponent(folderName)}/index.html`;
            try {
              const r = await fetch(url, { signal: AbortSignal.timeout(20000) });
              const roots = r.headers.get('X-Ipfs-Roots');
              console.log('X-Ipfs-Roots:', roots);
              if (roots) {
                const parts = roots.split(',').map(s => s.trim());
                finalCid = parts[1]; // parts[0]=outer, parts[1]=inner directory
              }
            } catch (e) {
              console.warn('Pinata gateway failed:', e.message);
            }

            // Fallback: try ipfs.io
            if (!finalCid) {
              try {
                const r = await fetch(
                  `https://ipfs.io/ipfs/${outerCid}/${encodeURIComponent(folderName)}/index.html`,
                  { signal: AbortSignal.timeout(20000) }
                );
                const roots = r.headers.get('X-Ipfs-Roots');
                console.log('X-Ipfs-Roots (ipfs.io):', roots);
                if (roots) {
                  const parts = roots.split(',').map(s => s.trim());
                  finalCid = parts[1];
                }
              } catch (e) {
                console.warn('ipfs.io fallback failed:', e.message);
              }
            }

            if (!finalCid) {
              throw new Error(`Could not resolve inner CID. Outer: ${outerCid}, folder: ${folderName}`);
            }

            console.log('Inner CID:', finalCid);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `cid=${finalCid}\n`);
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Show result
        run: |
          CID="${{ steps.deploy.outputs.cid }}"
          echo "Deployed CID: $CID"
          echo "## IPFS Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CID:** \`$CID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| inbrowser.link | https://${CID}.ipfs.inbrowser.link/ |" >> $GITHUB_STEP_SUMMARY
          echo "| ipfs.io | https://ipfs.io/ipfs/${CID}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare | https://cloudflare-ipfs.com/ipfs/${CID}/ |" >> $GITHUB_STEP_SUMMARY
